<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Einfacher Flowchart</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
.sf-mmc5unwp {
  position: relative;
  width: 100%;
  max-width: 900px;
  min-height: 500px;
  margin: 0 auto;
  background: #f8f9fb;
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  overflow: hidden;
  border-radius: 16px;
  border: 1px solid #e2e5ea;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
}
.sf-mmc5unwp * { box-sizing: border-box; margin: 0; padding: 0; }
.sf-mmc5unwp-canvas {
  position: relative;
  width: 100%;
  height: 100%;
  min-height: 500px;
}
.sf-mmc5unwp-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
.sf-mmc5unwp-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: visible;
}
.sf-mmc5unwp-node {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 8px 12px;
  cursor: pointer;
  user-select: none;
  backdrop-filter: blur(8px);
  transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
.sf-mmc5unwp-node:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(59,75,249,0.12), 0 2px 6px rgba(0,0,0,0.06);
  z-index: 10;
}
.sf-mmc5unwp-node-label {
  line-height: 1.3;
  word-break: break-word;
}
.sf-mmc5unwp-node-sublabel {
  opacity: 0.5;
  margin-top: 3px;
  font-weight: 400;
  letter-spacing: 0.02em;
}
.sf-mmc5unwp-node-icon {
  margin-bottom: 4px;
}
.sf-mmc5unwp-edge-label {
  font-family: 'Inter', sans-serif;
}
.sf-mmc5unwp-tooltip {
  position: absolute;
  background: rgba(255,255,255,0.95);
  color: #1a1a2e;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 11px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 100;
  white-space: nowrap;
  backdrop-filter: blur(12px);
  border: 1px solid #e2e5ea;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  letter-spacing: 0.02em;
}
.sf-mmc5unwp-tooltip.visible {
  opacity: 1;
}
@keyframes sf-mmc5unwp-fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.sf-mmc5unwp-node {
  animation: sf-mmc5unwp-fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
}
.sf-mmc5unwp-node:nth-child(1) { animation-delay: 0s; }
.sf-mmc5unwp-node:nth-child(2) { animation-delay: 0.1s; }
.sf-mmc5unwp-node:nth-child(3) { animation-delay: 0.2s; }
.sf-mmc5unwp-node:nth-child(4) { animation-delay: 0.30000000000000004s; }
.sf-mmc5unwp-node:nth-child(5) { animation-delay: 0.4s; }
@keyframes sf-mmc5unwp-edgeDraw {
  from { stroke-dashoffset: 1000; }
  to { stroke-dashoffset: 0; }
}
</style>
</head>
<body style="margin:0;padding:20px;background:#f0f1f5;display:flex;justify-content:center;align-items:center;min-height:100vh;">

</div>
<script>
(function() {
  var container = document.querySelector('.sf-mmc5unwp');
  if (!container) return;

  var tooltip = document.createElement('div');
  tooltip.className = 'sf-mmc5unwp-tooltip';
  container.appendChild(tooltip);

  var nodes = container.querySelectorAll('.sf-mmc5unwp-node');
  nodes.forEach(function(node) {
    node.addEventListener('mouseenter', function(e) {
      var label = node.getAttribute('data-label') || '';
      var sublabel = node.getAttribute('data-sublabel') || '';
      tooltip.textContent = sublabel ? label + ' — ' + sublabel : label;
      tooltip.classList.add('visible');
    });

    node.addEventListener('mousemove', function(e) {
      var rect = container.getBoundingClientRect();
      tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
      tooltip.style.top = (e.clientY - rect.top - 30) + 'px';
    });

    node.addEventListener('mouseleave', function() {
      tooltip.classList.remove('visible');
    });

    node.addEventListener('click', function() {
      nodes.forEach(function(n) { n.style.outline = 'none'; });
      node.style.outline = '2px solid #E93BCD';
    });
  });

  // Animated counters
  var counters = container.querySelectorAll('[data-counter]');
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        var el = entry.target;
        var target = parseFloat(el.getAttribute('data-counter'));
        var suffix = el.getAttribute('data-suffix') || '';
        var current = 0;
        var step = target / 40;
        var timer = setInterval(function() {
          current += step;
          if (current >= target) {
            current = target;
            clearInterval(timer);
          }
          el.textContent = Math.round(current) + suffix;
        }, 25);
        observer.unobserve(el);
      }
    });
  }, { threshold: 0.5 });

  counters.forEach(function(c) { observer.observe(c); });
})();
</script>
