.sf-mmc5umo3-tooltip.visible {

@keyframes sf-mmc5umo3-fadeIn {

}
.sf-mmc5umo3-node {
  animation: sf-mmc5umo3-fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
}
.sf-mmc5umo3-node:nth-child(1) { animation-delay: 0s; }

.sf-mmc5umo3-node:nth-child(3) { animation-delay: 0.2s; }
.sf-mmc5umo3-node:nth-child(4) { animation-delay: 0.30000000000000004s; }
.sf-mmc5umo3-node:nth-child(5) { animation-delay: 0.4s; }
@keyframes sf-mmc5umo3-edgeDraw {
  from { stroke-dashoffset: 1000; }
  to { stroke-dashoffset: 0; }
}

<script>
(function() {
  var container = document.querySelector('.sf-mmc5umo3');
  if (!container) return;

  var tooltip = document.createElement('div');
  tooltip.className = 'sf-mmc5umo3-tooltip';
  container.appendChild(tooltip);

  var nodes = container.querySelectorAll('.sf-mmc5umo3-node');
  nodes.forEach(function(node) {
    node.addEventListener('mouseenter', function(e) {
      var label = node.getAttribute('data-label') || '';
      var sublabel = node.getAttribute('data-sublabel') || '';
      tooltip.textContent = sublabel ? label + ' — ' + sublabel : label;
      tooltip.classList.add('visible');
    });

    node.addEventListener('mousemove', function(e) {
      var rect = container.getBoundingClientRect();
      tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
      tooltip.style.top = (e.clientY - rect.top - 30) + 'px';
    });

    node.addEventListener('mouseleave', function() {
      tooltip.classList.remove('visible');
    });

    node.addEventListener('click', function() {
      nodes.forEach(function(n) { n.style.outline = 'none'; });
      node.style.outline = '2px solid #E93BCD';
    });
  });

  // Animated counters
  var counters = container.querySelectorAll('[data-counter]');
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        var el = entry.target;
        var target = parseFloat(el.getAttribute('data-counter'));
        var suffix = el.getAttribute('data-suffix') || '';
        var current = 0;
        var step = target / 40;
        var timer = setInterval(function() {
          current += step;
          if (current >= target) {
            current = target;
            clearInterval(timer);
          }
          el.textContent = Math.round(current) + suffix;
        }, 25);
        observer.unobserve(el);
      }
    });
  }, { threshold: 0.5 });

  counters.forEach(function(c) { observer.observe(c); });
})();
</script>
